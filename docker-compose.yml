services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vuelos_sanitarios
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vuelos_sanitarios
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-VuelosSanitariosSecretKey2024SuperSecureBase64EncodedString}
      FRONTEND_URL: http://localhost:80
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_WS_URL: http://localhost/ws
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
